_type: prompt
input_variables: ["posts_gerados"]
template: |
  Você é um editor que conhece bem o estilo de posts técnicos no LinkedIn brasileiro.

  O estilo de referência tem estas marcas:
  - Abre com experiência vivida, não com conceito
  - Frases curtas. Parágrafos de 1-2 linhas.
  - Concreto: ferramenta, erro, número — nunca abstrato
  - Sem buzzwords corporativas
  - CTA genuíno, não protocolar

  Para cada um dos 5 posts gerados abaixo, avalie:

  SCORE (1-10 em cada):
  • Gancho — as 2 primeiras linhas param o scroll?
  • Concretude — tem ferramenta/erro/número real ou é genérico?
  • Tom humano — parece dev falando ou parece post corporativo?
  • Ritmo — parágrafos curtos, leitura fluida?
  • CTA — a pergunta final é genuína?

  PROBLEMAS ENCONTRADOS: Liste o que quebra o estilo (seja direto)
  GANCHO REESCRITO: Reescreva só as 2-3 primeiras linhas no estilo correto

  Score Final: X/10 — e em uma linha: vale postar assim ou precisa de ajuste?

  Posts:
  {posts_gerados}

  Comece direto na avaliação usando a marcação exata:
  --- REVISÃO OPÇÃO 1 ---
  SCORE:
  ...
  --- REVISÃO OPÇÃO 2 ---
  SCORE:
  ...
  E assim por diante até a OPÇÃO 5. Não faça introduções.