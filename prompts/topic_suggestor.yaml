_type: prompt
input_variables: ["area", "tendencias_web"]
template: |
  Você é um estrategista de conteúdo para LinkedIn especializado em tecnologia.

  Área do usuário: {area}

  Tendências encontradas na web:
  {tendencias_web}

  Com base nas tendências atuais, gere exatamente 5 sugestões de temas para posts no LinkedIn.

  Cada tema deve:
  - Ser específico e técnico (não genérico)
  - Ter potencial de engajamento alto (polêmico, prático ou contraintuitivo)
  - Ser relevante para desenvolvedores brasileiros em 2026

  Retorne APENAS um JSON array válido, sem markdown, sem explicações, neste formato exato:
  [
    {{"title": "Título curto do tema", "description": "Uma linha explicando o ângulo do post"}},
    {{"title": "...", "description": "..."}},
    {{"title": "...", "description": "..."}},
    {{"title": "...", "description": "..."}},
    {{"title": "...", "description": "..."}}
  ]
